; PlatformIO configuration for ESP32 with TFLite
; Uses ESP-IDF framework (not Arduino)

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf

; Monitor settings
monitor_speed = 115200

; Build flags
build_flags = 
    -std=c++17
    -DCONFIG_SPIRAM_CACHE_WORKAROUND

; Lib dependencies
lib_deps = 
    espressif/esp-tflite-micro@^1.3.1

; Partition table
board_build.partitions = default.csv
